<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rancangan Halaman Pengerjaan Soal</title>
    <style>
        
body {
    font-family: 'Courier New', Courier, monospace, sans-serif;
    background-color: #f0f0f0;
    color: #000;
    margin: 0;
    padding: 40px;
}
.wireframe-container {
    width: 1024px;
    margin: 0 auto;
    background: #ffffff;
    border: 3px solid #000000;
    padding: 30px;
    box-sizing: border-box;
    min-height: 650px;
    position: relative;
    box-shadow: 5px 5px 0px #000;
}
.header {
    border: 2px dashed #000;
    padding: 15px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fafafa;
}
.logo-placeholder {
    font-weight: bold;
    font-size: 20px;
    border: 2px solid #000;
    padding: 5px 10px;
}
.user-placeholder {
    display: flex;
    align-items: center;
    gap: 10px;
}
.avatar-circle {
    width: 30px;
    height: 30px;
    border: 2px dashed #000;
    border-radius: 50%;
    background: #eee;
}
.layout-sidebar {
    display: flex;
    gap: 20px;
}
.sidebar {
    width: 220px;
    border: 2px dashed #000;
    padding: 15px;
    min-height: 500px;
    background: #fafafa;
    box-sizing: border-box;
}
.sidebar-menu {
    list-style: none;
    padding: 0;
    margin: 0;
}
.sidebar-menu li {
    padding: 10px;
    border: 1px dashed #ccc;
    margin-bottom: 8px;
    font-weight: bold;
}
.sidebar-menu li.active {
    background: #000;
    color: #fff;
    border: 1px solid #000;
}
.main-content {
    flex-grow: 1;
    border: 2px dashed #000;
    padding: 20px;
    min-height: 500px;
    background: #ffffff;
    box-sizing: border-box;
}
.breadcrumb {
    font-size: 12px;
    margin-bottom: 15px;
    color: #666;
}
.box-placeholder {
    border: 2px dashed #999;
    background: #f7f7f7;
    padding: 20px;
    text-align: center;
    margin-bottom: 15px;
}
.input-group {
    margin-bottom: 15px;
}
.input-label {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
}
.input-field {
    width: 100%;
    padding: 10px;
    border: 2px dashed #000;
    box-sizing: border-box;
    background: #fff;
    font-family: inherit;
}
.btn {
    border: 2px solid #000;
    padding: 10px 20px;
    display: inline-block;
    background: #e0e0e0;
    text-align: center;
    cursor: pointer;
    font-weight: bold;
    text-decoration: none;
    color: #000;
}
.btn-primary {
    background: #000;
    color: #fff;
}
.btn-danger {
    background: #fff;
    border: 2px dashed red;
    color: red;
}
.table-wireframe {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    margin-bottom: 15px;
}
.table-wireframe th, .table-wireframe td {
    border: 2px dashed #000;
    padding: 10px;
    text-align: left;
}
.table-wireframe th {
    background: #e8e8e8;
}
.caption {
    text-align: center;
    margin-top: 30px;
    font-weight: bold;
    font-size: 16px;
    border-top: 1px solid #000;
    padding-top: 15px;
}
.grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
.grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
}
.card {
    border: 2px dashed #000;
    padding: 15px;
    margin-bottom: 15px;
}
.badge {
    border: 1px solid #000;
    padding: 2px 6px;
    font-size: 11px;
    background: #eee;
    font-weight: bold;
}

    </style>
</head>
<body>
    <div class="wireframe-container">
        
<div class="header">
    <div class="logo-placeholder">LMS MATEMATIKA - PENGERJAAN KUIS</div>
    <div style="font-weight:bold; font-size:18px;">WAKTU: 09:45</div>
</div>
<div style="margin: 0 auto; max-width: 900px; padding-top:20px;">
    <div class="card">
        <h3>PERTANYAAN NOMOR 3</h3>
        <p style="font-size: 16px; margin: 20px 0;">
            Sebuah toko buah memiliki <b>15</b> buah semangka. Hari ini terjual sebanyak <b>6</b> buah semangka. Berapa sisa buah semangka sekarang?
        </p>
        <div class="input-group">
            <span class="input-label">Masukkan Jawaban Angka Anda:</span>
            <input type="number" class="input-field" placeholder="Ketik jawaban angka numerik...">
        </div>
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:20px;">
        <button class="btn">< Soal Sebelumnya</button>
        <button class="btn btn-primary">Selesaikan & Kirim Kuis 🔒</button>
    </div>
</div>
<div class="caption">Gambar 3.21: Rancangan Antarmuka Halaman Pengerjaan Soal Kuis (Siswa)</div>

    </div>
</body>
</html>
